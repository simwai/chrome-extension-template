name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Create ZIP
        run: npm run zip

      - name: Semantic Release
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: npx semantic-release

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: chrome-extension-template.zip
