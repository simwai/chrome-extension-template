<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#100e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a18;stop-opacity:1" />
    </linearGradient>

    <!-- Purple accent gradient for shapes -->
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.6" />
    </linearGradient>

    <linearGradient id="purpleGlow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0.3" />
    </linearGradient>

    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e9d5ff" />
      <stop offset="50%" style="stop-color:#f3e8ff" />
      <stop offset="100%" style="stop-color:#c084fc" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>

    <clipPath id="roundedRect">
      <rect width="1200" height="280" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Ambient purple orbs -->
  <ellipse cx="180" cy="80" rx="160" ry="100" fill="#7c3aed" opacity="0.07" filter="url(#ambientGlow)"/>
  <ellipse cx="1050" cy="200" rx="180" ry="120" fill="#a855f7" opacity="0.06" filter="url(#ambientGlow)"/>
  <ellipse cx="600" cy="140" rx="220" ry="140" fill="#6d28d9" opacity="0.05" filter="url(#ambientGlow)"/>

  <!-- Abstract geometric: large hexagon outline (left) -->
  <polygon points="80,60 140,24 200,60 200,132 140,168 80,132" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.35" filter="url(#glow)"/>
  <polygon points="90,68 140,38 190,68 190,124 140,154 90,124" fill="none" stroke="#a855f7" stroke-width="0.6" opacity="0.2"/>

  <!-- Abstract geometric: medium hexagon (right) -->
  <polygon points="1030,50 1080,20 1130,50 1130,110 1080,140 1030,110" fill="none" stroke="#9333ea" stroke-width="1.2" opacity="0.3" filter="url(#glow)"/>
  <polygon points="1040,58 1080,34 1120,58 1120,102 1080,126 1040,102" fill="none" stroke="#c084fc" stroke-width="0.5" opacity="0.15"/>

  <!-- Grid dot pattern (upper right quadrant) -->
  <g opacity="0.12">
    <g fill="#a855f7">
      <!-- row 1 -->
      <circle cx="800" cy="20" r="1.2"/><circle cx="824" cy="20" r="1.2"/><circle cx="848" cy="20" r="1.2"/>
      <circle cx="872" cy="20" r="1.2"/><circle cx="896" cy="20" r="1.2"/><circle cx="920" cy="20" r="1.2"/>
      <circle cx="944" cy="20" r="1.2"/><circle cx="968" cy="20" r="1.2"/><circle cx="992" cy="20" r="1.2"/>
      <circle cx="1016" cy="20" r="1.2"/><circle cx="1040" cy="20" r="1.2"/>
      <!-- row 2 -->
      <circle cx="800" cy="44" r="1.2"/><circle cx="824" cy="44" r="1.2"/><circle cx="848" cy="44" r="1.2"/>
      <circle cx="872" cy="44" r="1.2"/><circle cx="896" cy="44" r="1.2"/><circle cx="920" cy="44" r="1.2"/>
      <circle cx="944" cy="44" r="1.2"/><circle cx="968" cy="44" r="1.2"/><circle cx="992" cy="44" r="1.2"/>
      <circle cx="1016" cy="44" r="1.2"/><circle cx="1040" cy="44" r="1.2"/>
      <!-- row 3 -->
      <circle cx="800" cy="68" r="1.2"/><circle cx="824" cy="68" r="1.2"/><circle cx="848" cy="68" r="1.2"/>
      <circle cx="872" cy="68" r="1.2"/><circle cx="896" cy="68" r="1.2"/><circle cx="920" cy="68" r="1.2"/>
      <circle cx="944" cy="68" r="1.2"/><circle cx="968" cy="68" r="1.2"/><circle cx="992" cy="68" r="1.2"/>
      <circle cx="1016" cy="68" r="1.2"/><circle cx="1040" cy="68" r="1.2"/>
      <!-- row 4 -->
      <circle cx="800" cy="92" r="1.2"/><circle cx="824" cy="92" r="1.2"/><circle cx="848" cy="92" r="1.2"/>
      <circle cx="872" cy="92" r="1.2"/><circle cx="896" cy="92" r="1.2"/><circle cx="920" cy="92" r="1.2"/>
      <circle cx="944" cy="92" r="1.2"/><circle cx="968" cy="92" r="1.2"/>
    </g>
  </g>

  <!-- Grid dot pattern (lower left) -->
  <g opacity="0.10">
    <g fill="#7c3aed">
      <circle cx="160" cy="200" r="1.2"/><circle cx="184" cy="200" r="1.2"/><circle cx="208" cy="200" r="1.2"/>
      <circle cx="232" cy="200" r="1.2"/><circle cx="256" cy="200" r="1.2"/>
      <circle cx="160" cy="224" r="1.2"/><circle cx="184" cy="224" r="1.2"/><circle cx="208" cy="224" r="1.2"/>
      <circle cx="232" cy="224" r="1.2"/><circle cx="256" cy="224" r="1.2"/>
      <circle cx="160" cy="248" r="1.2"/><circle cx="184" cy="248" r="1.2"/><circle cx="208" cy="248" r="1.2"/>
      <circle cx="232" cy="248" r="1.2"/><circle cx="256" cy="248" r="1.2"/>
    </g>
  </g>

  <!-- Diagonal accent lines (top-left to center) -->
  <line x1="0" y1="0" x2="300" y2="280" stroke="#7c3aed" stroke-width="0.5" opacity="0.12"/>
  <line x1="40" y1="0" x2="340" y2="280" stroke="#9333ea" stroke-width="0.4" opacity="0.08"/>

  <!-- Diagonal accent lines (bottom-right) -->
  <line x1="900" y1="0" x2="1200" y2="200" stroke="#a855f7" stroke-width="0.5" opacity="0.12"/>
  <line x1="940" y1="0" x2="1200" y2="160" stroke="#7c3aed" stroke-width="0.4" opacity="0.08"/>

  <!-- Connecting circuit-style lines -->
  <polyline points="220,180 280,180 280,220 360,220" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.2"/>
  <circle cx="220" cy="180" r="2.5" fill="#9333ea" opacity="0.4"/>
  <circle cx="360" cy="220" r="2.5" fill="#a855f7" opacity="0.4"/>

  <polyline points="950,100 1000,100 1000,60 1060,60" fill="none" stroke="#9333ea" stroke-width="0.8" opacity="0.2"/>
  <circle cx="950" cy="100" r="2.5" fill="#7c3aed" opacity="0.4"/>
  <circle cx="1060" cy="60" r="2.5" fill="#c084fc" opacity="0.35"/>

  <!-- Glowing orb accent: top-right -->
  <circle cx="1140" cy="40" r="50" fill="#7c3aed" opacity="0.06" filter="url(#ambientGlow)"/>
  <circle cx="1140" cy="40" r="18" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.25" filter="url(#glow)"/>
  <circle cx="1140" cy="40" r="5" fill="#c084fc" opacity="0.5" filter="url(#glow)"/>

  <!-- Glowing orb accent: bottom-left -->
  <circle cx="60" cy="240" r="40" fill="#6d28d9" opacity="0.07" filter="url(#ambientGlow)"/>
  <circle cx="60" cy="240" r="14" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.2" filter="url(#glow)"/>
  <circle cx="60" cy="240" r="4" fill="#a855f7" opacity="0.45" filter="url(#glow)"/>

  <!-- Horizontal separator line (glowing) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="url(#accentLine)" stroke-width="0.8" opacity="0.6"/>

  <!-- Chrome puzzle-piece icon (stylized) -->
  <g transform="translate(490, 100)" filter="url(#softGlow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="18" fill="#0d0d1a" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
    <!-- Puzzle segments (simplified chrome logo style) -->
    <path d="M0,-42 L14.5,-18 L-14.5,-18 Z" fill="#7c3aed" opacity="0.6"/>
    <path d="M36.4,21 L11.8,7 L24.3,-14.5 Z" fill="#9333ea" opacity="0.5"/>
    <path d="M-36.4,21 L-24.3,-14.5 L-11.8,7 Z" fill="#6d28d9" opacity="0.5"/>
    <path d="M0,42 L-14.5,18 L14.5,18 Z" fill="#a855f7" opacity="0.45"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="10" fill="#a855f7" opacity="0.4"/>
  </g>

  <!-- Main title -->
  <text x="600" y="136" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-0.5" filter="url(#glow)">chrome-extension-template</text>

  <!-- Subtitle -->
  <text x="600" y="172" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="#9b72cf" text-anchor="middle" letter-spacing="3" opacity="0.85">TYPESCRIPT · MV3 · AVA · XO · SEMANTIC RELEASE</text>

  <!-- Bottom tag line -->
  <text x="600" y="238" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" font-weight="300" fill="#6d28d9" text-anchor="middle" letter-spacing="1.5" opacity="0.7">A production-ready scaffold for modern Chrome extensions</text>

  <!-- Border glow -->
  <rect width="1200" height="280" rx="12" ry="12" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.3"/>
</svg>
